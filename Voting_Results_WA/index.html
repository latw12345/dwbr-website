<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Public Sans', -apple-system, system-ui, sans-serif;
  background: #f5f7f6;
  color: #4a5f58;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#map-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}

svg#map {
  display: block;
  width: 100%;
  height: 100%;
}

.district {
  stroke: #f5f7f6;
  stroke-width: 0.6px;
  cursor: pointer;
  transition: stroke-width 0.1s;
}

.district:hover {
  stroke: #fff;
  stroke-width: 1.8px;
}

.slider-group {
  cursor: ew-resize;
}

.compare-label {
  position: absolute;
  top: 14px;
  width: 80px;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: rgba(74, 95, 88, 0.45);
  pointer-events: none;
  z-index: 5;
  display: none;
}
#compare-label-left  { left: 0; }
#compare-label-right { right: 0; }

/* Tooltip */
#tooltip {
  position: absolute;
  pointer-events: none;
  background: #fff;
  border: 1px solid #dde8e3;
  border-radius: 8px;
  padding: 10px 13px;
  box-shadow: 0 4px 18px rgba(74,95,88,.13);
  font-size: 13px;
  min-width: 180px;
  max-width: 260px;
  opacity: 0;
  transition: opacity 0.1s;
  z-index: 10;
}

.tt-dist {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: #7f918a;
  margin-bottom: 7px;
}

.tt-agg {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  margin-bottom: 8px;
  padding-bottom: 7px;
  border-bottom: 1px solid #eef3f1;
  color: #4a5f58;
}

.tt-compare-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: #b0b8b4;
  margin-bottom: 4px;
}

.tt-sep {
  border-top: 1px solid #eef3f1;
  margin: 5px 0 6px;
}

.tt-row {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 2px 0;
}

.tt-name {
  font-size: 13px;
  font-weight: 600;
  color: #1a2820;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tt-party {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .06em;
  padding: 1px 5px;
  border-radius: 3px;
  flex-shrink: 0;
}
.tt-party.D { background: #dbe8f5; color: #1d5fa8; }
.tt-party.R { background: #f5dbe0; color: #b02020; }

.tt-vote {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .06em;
  flex-shrink: 0;
}
.tt-vote.Yea     { color: #3d6b5e; }
.tt-vote.Nay     { color: #8b3a3a; }
.tt-vote.Excused { color: #7f918a; }
.tt-vote.No-Vote { color: #7f918a; }

/* Bottom bar */
.bottom-bar {
  padding: 8px 0 10px;
  text-align: center;
  background: #f5f7f6;
}

.controls-row {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  flex-wrap: nowrap;
  background: rgba(245,247,246,.97);
  padding: 7px 14px;
  border-radius: 999px;
  border: 1px solid #dde8e3;
  box-shadow: 0 2px 12px rgba(74,95,88,.07);
}

.chamber-btn {
  padding: 4px 14px;
  border: 1px solid transparent;
  background: transparent;
  color: #7f918a;
  cursor: pointer;
  border-radius: 999px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  transition: all .18s;
  flex-shrink: 0;
}

.chamber-btn.active {
  background: #6f8f85;
  color: #fff;
  border-color: #5b7a70;
}

.chamber-btn:not(.active):hover {
  background: #e6efeb;
  color: #4a5f58;
}

.bar-sep {
  width: 1px;
  height: 16px;
  background: #dde8e3;
  flex-shrink: 0;
}

.legend {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  flex-wrap: nowrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: #7f918a;
  white-space: nowrap;
}

.legend-swatch {
  width: 11px;
  height: 11px;
  border-radius: 2px;
  flex-shrink: 0;
}
</style>

<div id="map-wrap">

const g2026 = svg.append("g").attr("clip-path", "url(#clip-2026)");

// Slider (compare mode only)
const sliderGroup = svg.append("g").attr("class", "slider-group").style("display", "none");

const sliderHit = sliderGroup.append("rect")
    .attr("fill", "transparent").attr("y", 0).attr("width", 32);

const sliderLine = sliderGroup.append("line")
    .attr("stroke", "#fff").attr("stroke-width", 2).attr("pointer-events", "none");

const sliderHandle = sliderGroup.append("circle")
    .attr("r", 18).attr("fill", "#fff")
    .attr("stroke", "#dde8e3").attr("stroke-width", 1.5)
    .attr("filter", "drop-shadow(0 2px 6px rgba(74,95,88,.18))")
    .attr("pointer-events", "none");

sliderGroup.append("text")
    .attr("class", "slider-arrows")
    .attr("text-anchor", "middle").attr("dominant-baseline", "central")
    .attr("font-family", "system-ui, sans-serif").attr("font-size", 10)
    .attr("fill", "#7f918a").attr("pointer-events", "none")
    .text("◀ ▶");

// ── Helpers ──────────────────────────────────────────────────────────
function dims() {
  return { W: mapWrap.clientWidth, H: mapWrap.clientHeight };
}

function buildProjection(geo) {
  const { W, H } = dims();
  return d3.geoMercator().fitExtent([[16, 16], [W - 16, H - 16]], geo);
}

function updateSlider() {
  const { W, H } = dims();
  const x = sliderX;
  clipRect.attr("x", x).attr("y", 0).attr("width", W - x).attr("height", H);
  sliderHit.attr("x", x - 16).attr("height", H);
  sliderLine.attr("x1", x).attr("y1", 0).attr("x2", x).attr("y2", H);
  sliderHandle.attr("cx", x).attr("cy", H / 2);
  svg.select(".slider-arrows").attr("x", x).attr("y", H / 2);
}

sliderGroup.call(
  d3.drag().on("start drag", function(event) {
    const { W } = dims();
    sliderX = Math.max(80, Math.min(W - 80, event.x));
    updateSlider();
  })
);

window.addEventListener("resize", () => { if (compareMode) updateSlider(); });

// ── Color helpers ────────────────────────────────────────────────────
function houseColor(d) {
  return HOUSE_COLORS[d.properties["House Aggregate 2026_Vote"]] || BASE_COLOR;
}
function senateColor(d) {
  return SENATE_COLORS[d.properties["Senate 2026_Vote"]] || BASE_COLOR;
}
function houseColor2020(d) {
  return HOUSE_COLORS[d.properties["House Aggregate 2020_Vote"]] || BASE_COLOR;
}
function senateColor2020(d) {
  return SENATE_COLORS[d.properties["Senate 2020_Vote"]] || BASE_COLOR;
}

// ── Tooltip ──────────────────────────────────────────────────────────
function showTooltip(event, d) {
  const dist  = d.properties.District;
  const wrapR = mapWrap.getBoundingClientRect();
  let html;

  if (compareMode) {
    const f20 = lookup2020.get(dist);
    const f26 = lookup2026.get(dist);
    // Remove built-in border from tt-agg in compare mode; tt-sep handles year separation
    const AS = "border-bottom:none;margin-bottom:3px;padding-bottom:0";

    if (current === "house") {
      const agg20 = f20?.properties["House Aggregate 2020_Vote"] || "";
      const agg26 = f26?.properties["House Aggregate 2026_Vote"] || "";
      const c20   = HOUSE_COLORS[agg20] || "#7f918a";
      const c26   = HOUSE_COLORS[agg26] || "#7f918a";
      const memberRow = m =>
        `<div class="tt-row">
          <span class="tt-name">${m.f} ${m.l}</span>
          <span class="tt-party ${m.p}">${m.p}</span>
          <span class="tt-vote ${m.v}">${m.v}</span>
        </div>`;
      const members20 = (HM2020[dist] || []).map(memberRow).join("");
      const members26 = (HM[dist]    || []).map(memberRow).join("");
      html =
        `<div class="tt-dist">District ${dist}</div>` +
        `<div class="tt-compare-label">2020</div>` +
        `<div class="tt-agg" style="color:${c20};${AS}">${HOUSE_AGG_LABEL[agg20] || agg20}</div>` +
        members20 +
        `<div class="tt-sep"></div>` +
        `<div class="tt-compare-label">2026</div>` +
        `<div class="tt-agg" style="color:${c26};${AS}">${HOUSE_AGG_LABEL[agg26] || agg26}</div>` +
        members26;
    } else {
      const v20 = f20?.properties["Senate 2020_Vote"]  || "";
      const v26 = f26?.properties["Senate 2026_Vote"]  || "";
      const c20 = SENATE_COLORS[v20] || "#7f918a";
      const c26 = SENATE_COLORS[v26] || "#7f918a";
      html =
        `<div class="tt-dist">District ${dist}</div>` +
        `<div class="tt-compare-label">2020</div>` +
        `<div class="tt-agg" style="color:${c20};${AS}">${v20}</div>` +
        `<div class="tt-row">
          <span class="tt-name">${f20?.properties["Senate 2020_First"] || ""} ${f20?.properties["Senate 2020_Last"] || ""}</span>
          <span class="tt-party ${f20?.properties["Senate 2020_Party"] || ""}">${f20?.properties["Senate 2020_Party"] || ""}</span>
          <span class="tt-vote ${v20}">${v20}</span>
        </div>` +
        `<div class="tt-sep"></div>` +
        `<div class="tt-compare-label">2026</div>` +
        `<div class="tt-agg" style="color:${c26};${AS}">${v26}</div>` +
        `<div class="tt-row">
          <span class="tt-name">${f26?.properties["Senate 2026_First"] || ""} ${f26?.properties["Senate 2026_Last"] || ""}</span>
          <span class="tt-party ${f26?.properties["Senate 2026_Party"] || ""}">${f26?.properties["Senate 2026_Party"] || ""}</span>
          <span class="tt-vote ${v26}">${v26}</span>
        </div>`;
    }
  } else {
    let aggColor, aggLabel, rows;
    if (current === "house") {
      const agg = d.properties["House Aggregate 2026_Vote"] || "";
      aggColor   = HOUSE_COLORS[agg] || "#7f918a";
      aggLabel   = HOUSE_AGG_LABEL[agg] || agg;
      rows = (HM[dist] || []).map(m =>
        `<div class="tt-row">
          <span class="tt-name">${m.f} ${m.l}</span>
          <span class="tt-party ${m.p}">${m.p}</span>
          <span class="tt-vote ${m.v}">${m.v}</span>
        </div>`
      ).join("");
    } else {
      const vote  = d.properties["Senate 2026_Vote"]  || "";
      const first = d.properties["Senate 2026_First"] || "";
      const last  = d.properties["Senate 2026_Last"]  || "";
      const party = d.properties["Senate 2026_Party"] || "";
      aggColor = SENATE_COLORS[vote] || "#7f918a";
      aggLabel = vote;
      rows = `<div class="tt-row">
        <span class="tt-name">${first} ${last}</span>
        <span class="tt-party ${party}">${party}</span>
        <span class="tt-vote ${vote}">${vote}</span>
      </div>`;
    }
    html =
      `<div class="tt-dist">District ${dist}</div>` +
      `<div class="tt-agg" style="color:${aggColor}">${aggLabel}</div>` +
      rows;
  }

  tooltip.innerHTML = html;
  tooltip.style.opacity = "1";

  const tx = event.clientX - wrapR.left;
  const ty = event.clientY - wrapR.top;
  const tw = tooltip.offsetWidth  || 220;
  const th = tooltip.offsetHeight || 80;
  const { W, H } = dims();
  tooltip.style.left = (tx + 14 + tw > W ? tx - tw - 10 : tx + 14) + "px";
  tooltip.style.top  = (ty - 10 + th > H ? ty - th - 4  : ty - 10) + "px";
}

function hideTooltip() {
  tooltip.style.opacity = "0";
}

// ── Legend ───────────────────────────────────────────────────────────
function renderLegend(chamber) {
  const items = chamber === "house" ? HOUSE_LEGEND : SENATE_LEGEND;
  document.getElementById("legend").innerHTML = items.map(i =>
    `<span class="legend-item">
      <span class="legend-swatch" style="background:${i.color}"></span>${i.label}
    </span>`
  ).join("");
}

// ── Draw / update ────────────────────────────────────────────────────
function draw(chamber) {
  const geo26   = chamber === "house" ? houseGeo      : senateGeo;
  const geo20   = chamber === "house" ? houseGeo2020  : senateGeo2020;
  const color26 = chamber === "house" ? houseColor    : senateColor;
  const color20 = chamber === "house" ? houseColor2020 : senateColor2020;

  lookup2026 = new Map(geo26.features.map(f => [f.properties.District, f]));
  lookup2020 = new Map(geo20.features.map(f => [f.properties.District, f]));

  const proj   = buildProjection(geo26);
  const pathFn = d3.geoPath().projection(proj);

  // Clip: full width in normal mode, sliderX-based in compare mode
  if (compareMode) {
    if (sliderX === null) sliderX = dims().W / 2;
    sliderGroup.style("display", null);
    d3.select("#compare-label-left").style("display", "block");
    d3.select("#compare-label-right").style("display", "block");
    updateSlider();
  } else {
    const { W, H } = dims();
    clipRect.attr("x", 0).attr("y", 0).attr("width", W).attr("height", H);
    sliderGroup.style("display", "none");
    d3.select("#compare-label-left").style("display", "none");
    d3.select("#compare-label-right").style("display", "none");
  }

  // 2020 layer — only populated in compare mode
  g2020.selectAll("path.district")
    .data(compareMode ? geo20.features : [], d => d.properties.GEOID)
    .join(
      enter => enter.append("path")
        .attr("class", "district")
        .attr("d", pathFn)
        .attr("fill", color20)
        .on("mousemove", (evt, d) => showTooltip(evt, d))
        .on("mouseleave", hideTooltip),
      update => update
        .transition().duration(380).ease(d3.easeCubicOut)
        .attr("fill", color20),
      exit => exit.remove()
    );

  // 2026 layer — always shown (clipped right in compare mode, full in normal)
  g2026.selectAll("path.district")
    .data(geo26.features, d => d.properties.GEOID)
    .join(
      enter => enter.append("path")
        .attr("class", "district")
        .attr("d", pathFn)
        .attr("fill", color26)
        .on("mousemove", (evt, d) => showTooltip(evt, d))
        .on("mouseleave", hideTooltip),
      update => update
        .transition().duration(380).ease(d3.easeCubicOut)
        .attr("fill", color26)
    );

  renderLegend(chamber);
}

// ── Controls ─────────────────────────────────────────────────────────
document.getElementById("btn-house").addEventListener("click", () => {
  if (current === "house") return;
  current = "house";
  document.getElementById("btn-house").classList.add("active");
  document.getElementById("btn-senate").classList.remove("active");
  draw("house");
});

document.getElementById("btn-senate").addEventListener("click", () => {
  if (current === "senate") return;
  current = "senate";
  document.getElementById("btn-senate").classList.add("active");
  document.getElementById("btn-house").classList.remove("active");
  draw("senate");
});

document.getElementById("btn-compare").addEventListener("click", () => {
  compareMode = !compareMode;
  document.getElementById("btn-compare").classList.toggle("active", compareMode);
  hideTooltip();
  draw(current);
});

// ── Load & init ───────────────────────────────────────────────────────
Promise.all([
  d3.json("house_aggregate.geojson"),
  d3.json("senate_aggregate.geojson"),
  d3.json("2020_house_aggregate.geojson"),
  d3.json("2020_senate_aggregate.geojson"),
]).then(([house, senate, house20, senate20]) => {
  houseGeo      = house;
  senateGeo     = senate;
  houseGeo2020  = house20;
  senateGeo2020 = senate20;
  draw("house");
}).catch(() => {
  mapWrap.innerHTML =
    `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#7f918a;font-size:14px;font-family:'Public Sans',sans-serif;">
      Could not load district data.
    </div>`;
});
</script>
</body>
</html>
