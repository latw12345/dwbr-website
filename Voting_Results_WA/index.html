<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WA DWBR Vote Map · 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Public Sans', -apple-system, system-ui, sans-serif;
  background: #f5f7f6;
  color: #4a5f58;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#map-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}

svg#map {
  display: block;
  width: 100%;
  height: 100%;
}

.district {
  stroke: #f5f7f6;
  stroke-width: 0.6px;
  cursor: pointer;
  transition: stroke-width 0.1s;
}

.district:hover {
  stroke: #fff;
  stroke-width: 1.8px;
}

/* Tooltip */
#tooltip {
  position: absolute;
  pointer-events: none;
  background: #fff;
  border: 1px solid #dde8e3;
  border-radius: 8px;
  padding: 10px 13px;
  box-shadow: 0 4px 18px rgba(74,95,88,.13);
  font-size: 13px;
  min-width: 180px;
  max-width: 240px;
  opacity: 0;
  transition: opacity 0.1s;
  z-index: 10;
}

.tt-dist {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: #7f918a;
  margin-bottom: 7px;
}

.tt-agg {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  margin-bottom: 8px;
  padding-bottom: 7px;
  border-bottom: 1px solid #eef3f1;
}
.tt-agg { color: #4a5f58; }

.tt-row {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 2px 0;
}

.tt-name {
  font-size: 13px;
  font-weight: 600;
  color: #1a2820;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tt-party {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .06em;
  padding: 1px 5px;
  border-radius: 3px;
  flex-shrink: 0;
}
.tt-party.D { background: #dbe8f5; color: #1d5fa8; }
.tt-party.R { background: #f5dbe0; color: #b02020; }

.tt-vote {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .06em;
  flex-shrink: 0;
}
.tt-vote.Yea     { color: #3d6b5e; }
.tt-vote.Nay     { color: #8b3a3a; }
.tt-vote.Excused { color: #7f918a; }
.tt-vote.No-Vote { color: #7f918a; }

/* Bottom bar */
.bottom-bar {
  padding: 8px 0 10px;
  text-align: center;
  background: #f5f7f6;
}

.controls-row {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  flex-wrap: nowrap;
  background: rgba(245,247,246,.97);
  padding: 7px 14px;
  border-radius: 999px;
  border: 1px solid #dde8e3;
  box-shadow: 0 2px 12px rgba(74,95,88,.07);
}

.chamber-btn {
  padding: 4px 14px;
  border: 1px solid transparent;
  background: transparent;
  color: #7f918a;
  cursor: pointer;
  border-radius: 999px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  transition: all .18s;
  flex-shrink: 0;
}

.chamber-btn.active {
  background: #6f8f85;
  color: #fff;
  border-color: #5b7a70;
}

.chamber-btn:not(.active):hover {
  background: #e6efeb;
  color: #4a5f58;
}

.bar-sep {
  width: 1px;
  height: 16px;
  background: #dde8e3;
  flex-shrink: 0;
}

.legend {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  flex-wrap: nowrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: #7f918a;
  white-space: nowrap;
}

.legend-swatch {
  width: 11px;
  height: 11px;
  border-radius: 2px;
  flex-shrink: 0;
}
</style>
</head>
<body>

<div id="map-wrap">
  <svg id="map"></svg>
  <div id="tooltip"></div>
</div>

<div class="bottom-bar">
  <div class="controls-row">
    <button class="chamber-btn active" id="btn-house">House</button>
    <button class="chamber-btn"        id="btn-senate">Senate</button>
    <div class="bar-sep"></div>
    <div class="legend" id="legend"></div>

  45: [{f:"Roger",    l:"Goodman",     p:"D",v:"Yea"},    {f:"Larry",     l:"Springer",   p:"D",v:"Yea"}],
  46: [{f:"Darya",    l:"Farivar",     p:"D",v:"Yea"},    {f:"Gerry",     l:"Pollet",     p:"D",v:"Yea"}],

  48: [{f:"Osman",    l:"Salahuddin",  p:"D",v:"Yea"},    {f:"Amy",       l:"Walen",      p:"D",v:"Nay"}],
  49: [{f:"Monica",   l:"Stonier",     p:"D",v:"Yea"},    {f:"Sharon",    l:"Wylie",      p:"D",v:"Yea"}],

// ── State ────────────────────────────────────────────────────────────
let current = "house";
let houseGeo = null, senateGeo = null;
const tooltip = document.getElementById("tooltip");
const mapWrap = document.getElementById("map-wrap");

// ── SVG / projection setup ───────────────────────────────────────────
const svg = d3.select("#map");
const g   = svg.append("g");

function dims() {
  return { W: mapWrap.clientWidth, H: mapWrap.clientHeight };
}

function buildProjection(geo) {
  const { W, H } = dims();
  return d3.geoMercator().fitExtent([[16, 16], [W - 16, H - 16]], geo);
}

// ── Color helpers ────────────────────────────────────────────────────
function houseColor(d) {
  const v = d.properties["House Aggregate 2026_Vote"];
  return HOUSE_COLORS[v] || BASE_COLOR;
}

function senateColor(d) {
  const v = d.properties["Senate 2026_Vote"];
  return SENATE_COLORS[v] || BASE_COLOR;
}

// ── Tooltip ──────────────────────────────────────────────────────────
function showTooltip(event, d) {
  const dist   = d.properties.District;
  const wrapR  = mapWrap.getBoundingClientRect();

  let aggColor, aggLabel, rows;

  if (current === "house") {
    const agg = d.properties["House Aggregate 2026_Vote"] || "";
    aggColor  = HOUSE_COLORS[agg] || "#7f918a";
    aggLabel  = HOUSE_AGG_LABEL[agg] || agg;
    const members = HM[dist] || [];
    rows = members.map(m =>
      `<div class="tt-row">
        <span class="tt-name">${m.f} ${m.l}</span>
        <span class="tt-party ${m.p}">${m.p}</span>
        <span class="tt-vote ${m.v}">${m.v}</span>
      </div>`
    ).join("");
  } else {
    const vote  = d.properties["Senate 2026_Vote"]  || "";
    const first = d.properties["Senate 2026_First"] || "";
    const last  = d.properties["Senate 2026_Last"]  || "";
    const party = d.properties["Senate 2026_Party"] || "";
    aggColor  = SENATE_COLORS[vote] || "#7f918a";
    aggLabel  = vote;
    rows = `<div class="tt-row">
      <span class="tt-name">${first} ${last}</span>
      <span class="tt-party ${party}">${party}</span>
      <span class="tt-vote ${vote}">${vote}</span>
    </div>`;
  }

  tooltip.innerHTML =
    `<div class="tt-dist">District ${dist}</div>` +
    `<div class="tt-agg" style="color:${aggColor}">${aggLabel}</div>` +
    rows;

  tooltip.style.opacity = "1";

  const tx = event.clientX - wrapR.left;
  const ty = event.clientY - wrapR.top;
  const tw = tooltip.offsetWidth  || 220;
  const th = tooltip.offsetHeight || 80;
  const { W, H } = dims();

  tooltip.style.left = (tx + 14 + tw > W ? tx - tw - 10 : tx + 14) + "px";
  tooltip.style.top  = (ty - 10 + th > H ? ty - th - 4  : ty - 10) + "px";
}

function hideTooltip() {
  tooltip.style.opacity = "0";
}

// ── Legend ───────────────────────────────────────────────────────────
function renderLegend(chamber) {
  const items = chamber === "house" ? HOUSE_LEGEND : SENATE_LEGEND;
  document.getElementById("legend").innerHTML = items.map(i =>
    `<span class="legend-item">
      <span class="legend-swatch" style="background:${i.color}"></span>${i.label}
    </span>`
  ).join("");
}

// ── Draw / update ────────────────────────────────────────────────────
function draw(chamber) {
  const geo = chamber === "house" ? houseGeo : senateGeo;
  const colorFn = chamber === "house" ? houseColor : senateColor;
  const proj = buildProjection(geo);
  const pathFn = d3.geoPath().projection(proj);

  g.selectAll("path.district")
    .data(geo.features, d => d.properties.GEOID)
    .join(
      enter => enter.append("path")
        .attr("class", "district")
        .attr("d", pathFn)
        .attr("fill", colorFn)
        .on("mousemove", (evt, d) => showTooltip(evt, d))
        .on("mouseleave", hideTooltip),
      update => update
        .transition().duration(380).ease(d3.easeCubicOut)
        .attr("fill", colorFn)
    );

  renderLegend(chamber);
}

// ── Controls ─────────────────────────────────────────────────────────
document.getElementById("btn-house").addEventListener("click", () => {
  if (current === "house") return;
  current = "house";
  document.getElementById("btn-house").classList.add("active");
  document.getElementById("btn-senate").classList.remove("active");
  draw("house");
});

document.getElementById("btn-senate").addEventListener("click", () => {
  if (current === "senate") return;
  current = "senate";
  document.getElementById("btn-senate").classList.add("active");
  document.getElementById("btn-house").classList.remove("active");
  draw("senate");
});

// ── Load & init ───────────────────────────────────────────────────────
Promise.all([
  d3.json("house_aggregate.geojson"),
  d3.json("senate_aggregate.geojson"),
]).then(([house, senate]) => {
  houseGeo  = house;
  senateGeo = senate;
  draw("house");
}).catch(() => {
  mapWrap.innerHTML =
    `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#7f918a;font-size:14px;font-family:'Public Sans',sans-serif;">
      Could not load district data.
    </div>`;
});
</script>
