<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Domestic Workers Bill of Rights Victories</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Public Sans', -apple-system, system-ui, sans-serif;
    background: #f5f7f6;
    color: #4a5f58;
    padding-bottom: 60px;
}

svg {
    display: block;
    margin: 16px auto 0 auto;
}

path.active {
    cursor: pointer;
}

path.active:hover {
    stroke: #fff;
    stroke-width: 1.8px;
}

circle.active-point {
    cursor: pointer;
}

circle.active-point:hover {
    stroke: #3d5a4a;
    stroke-width: 3px;
}

.bottom-bar {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 10px;
    width: 100%;
    text-align: center;
}

.controls-row {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    flex-wrap: nowrap;
    justify-content: center;
    background: rgba(245, 247, 246, 0.97);
    padding: 7px 14px;
    border-radius: 999px;
    border: 1px solid #dde8e3;
    max-width: calc(100vw - 24px);
    overflow-x: auto;
    box-shadow: 0 2px 12px rgba(74,95,88,.07);
}

button {
    padding: 4px 14px;
    border: none;
    background: #6f8f85;
    color: white;
    cursor: pointer;
    border-radius: 999px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    flex-shrink: 0;
}

button:hover {
    background: #5b7a70;
}

.counter-label {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .1em;
    fill: #4f6e64;
    pointer-events: none;
}

.bar-sep {
    width: 1px;
    height: 16px;
    background: #dde8e3;
    flex-shrink: 0;
}

.years {
    display: inline-flex;
    flex-wrap: nowrap;
    gap: 4px;
    color: #7f918a;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
}

.year {
    cursor: pointer;
    padding: 3px 6px;
    border-radius: 999px;
    transition: color 0.15s ease, background 0.15s ease;
}

.year:hover {
    color: #5b7a70;
    background: #e6efeb;
}

.year.active {
    color: #5b7a70;
    font-weight: 700;
    background: #dde8e3;
}

.year-label {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    fill: #4f6e64;
    stroke: #f5f7f6;
    stroke-width: 4px;
    stroke-linejoin: round;
    paint-order: stroke fill;
    pointer-events: none;
}

.label-line {
    stroke: #91a39c;
    stroke-width: 1.2px;
    opacity: 0.9;
    pointer-events: none;
}

/* Tooltip — matched to Fig. 04 */
#tooltip {
    position: fixed;
    pointer-events: none;
    background: #fff;
    border: 1px solid #dde8e3;
    border-radius: 8px;
    padding: 10px 13px;
    box-shadow: 0 4px 18px rgba(74,95,88,.13);
    opacity: 0;
    transition: opacity 0.1s;
    z-index: 100;
    min-width: 130px;
}

.tt-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #7f918a;
    margin-bottom: 5px;
}

.tt-year {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .08em;
    color: #4a7c6e;
}
</style>
</head>
<body>

<svg width="960" height="520">
  <text id="counter" class="counter-label" x="18" y="22">LAW 0 OF 16</text>
</svg>

<div class="bottom-bar">
  <div class="controls-row">
    <button id="play-btn" onclick="togglePlay()">Play</button>
    <div class="bar-sep"></div>
    <div class="years" id="years"></div>
  </div>
</div>

<div id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-year" id="tt-year"></div>
</div>

<script>
const width = 960, height = 520;
const svg = d3.select("svg");

const projection = d3.geoAlbersUsa()
    .translate([width / 2, height / 2 + 10])
    .scale(1000);

const path = d3.geoPath().projection(projection);

let currentYear = 2010;
let interval = null;
let isPlaying = false;

const years = d3.range(2010, 2027);

const yearContainer = d3.select("#years");
years.forEach(y => {
    yearContainer.append("span")
        .attr("id", "year-" + y)
        .attr("class", "year")
        .text(y)
        .on("click", () => {
            stopPlay();
            currentYear = y;
            updateMap(currentYear);
        });
});

function updateYearDisplay(year) {
    years.forEach(y => {
        d3.select("#year-" + y).classed("active", y === year);
    });
}

function stopPlay() {
    clearInterval(interval);
    interval = null;
    isPlaying = false;
    d3.select("#play-btn").text("Play");
}

function startPlay() {
    stopPlay();
    isPlaying = true;
    d3.select("#play-btn").text("Pause");

    interval = setInterval(() => {
        if (currentYear < 2026) {
            currentYear++;
            updateMap(currentYear);
        } else {
            stopPlay();
        }
    }, 2000);
}

window.togglePlay = function() {
    if (isPlaying) {
        stopPlay();
    } else {
        if (currentYear >= 2026) currentYear = 2010;
        startPlay();
    }
};

function getYearValue(d) {
    const y = +d.properties.DWBR_Timeline_US_States_year;
    return (!isNaN(y) && y > 0) ? y : null;
}

function getName(d) {
    return d.properties.NAME || d.properties.name || "";
}

function isPoint(d) {
    return d.geometry && d.geometry.type === "Point";
}

const tooltipEl = document.getElementById("tooltip");

function showTooltip(event, d) {
    document.getElementById("tt-name").textContent = getName(d);
    document.getElementById("tt-year").textContent = "Passed " + getYearValue(d);
    tooltipEl.style.opacity = "1";
    moveTooltip(event);
}

function moveTooltip(event) {
    let x = event.clientX + 14;
    let y = event.clientY - 10;
    if (x + 170 > window.innerWidth) x = event.clientX - 170 - 6;
    if (y + 56 > window.innerHeight) y = event.clientY - 56;
    tooltipEl.style.left = x + "px";
    tooltipEl.style.top = y + "px";
}

function hideTooltip() {
    tooltipEl.style.opacity = "0";
}

d3.json("DWBR_Timeline_US_States_with_Cities.geojson").then(data => {
    const allFeatures = data.features;
    const total = allFeatures.filter(d => getYearValue(d) !== null).length;

    function pointCoords(d) {
        if (!isPoint(d)) return null;
        const p = projection(d.geometry.coordinates);
        if (!p) return null;
        return { x: p[0], y: p[1] };
    }

    function labelPosition(d) {
        const name = getName(d);

        if (isPoint(d)) {
            const p = pointCoords(d);
            if (!p) return null;

            let dx = 10, dy = -10, anchor = "start";
            if (name === "Seattle") { dx = 10; dy = -10; }
            else if (name === "Philadelphia") { dx = 10; dy = -10; }
            else if (name === "District of Columbia") { dx = 10; dy = -2; }

            return {
                x: p.x + dx,
                y: p.y + dy,
                anchor,
                lineX1: p.x,
                lineY1: p.y,
                lineX2: p.x + dx - 3,
                lineY2: p.y + dy + 2
            };
        }

        const c = path.centroid(d);
        if (!isFinite(c[0]) || !isFinite(c[1])) return null;

        let dx = 0, dy = 0, anchor = "middle";
        if (name === "New York") { dx = 22; dy = -12; anchor = "start"; }
        else if (name === "Massachusetts") { dx = 20; dy = -3; anchor = "start"; }
        else if (name === "Connecticut") { dx = 20; dy = 11; anchor = "start"; }
        else if (name === "Rhode Island") { dx = 20; dy = 24; anchor = "start"; }
        else if (name === "New Jersey") { dx = 20; dy = 13; anchor = "start"; }
        else if (name === "Hawaii") { dy = 20; }
        else if (name === "Alaska") { dy = 18; }

        return {
            x: c[0] + dx,
            y: c[1] + dy,
            anchor,
            lineX1: c[0],
            lineY1: c[1],
            lineX2: c[0] + (dx ? dx - 4 : 0),
            lineY2: c[1] + (dy ? dy - 4 : 0)
        };
    }

    svg.selectAll("path.base")
        .data(allFeatures.filter(d => !isPoint(d)))
        .enter()
        .append("path")
        .attr("class", "base")
        .attr("d", path)
        .attr("fill", "#dde8e3")
        .attr("stroke", "#f5f7f6")
        .attr("stroke-width", 0.8);

    const activePolygonLayer = svg.append("g");
    const activePointLayer = svg.append("g");
    const labelLineLayer = svg.append("g");
    const labelLayer = svg.append("g");

    window.updateMap = function(year) {
        updateYearDisplay(year);

        const activeFeatures = allFeatures.filter(d => {
            const y = getYearValue(d);
            return y !== null && y <= year;
        });

        const newFeatures = allFeatures.filter(d => {
            const y = getYearValue(d);
            return y !== null && y === year;
        });

        d3.select("#counter").text("LAW " + activeFeatures.length + " OF " + total);

        const activePolygons = activeFeatures.filter(d => !isPoint(d));
        const activePoints = activeFeatures.filter(d => isPoint(d));

        const polygonJoin = activePolygonLayer.selectAll("path.active")
            .data(activePolygons, d => getName(d));

        const enteredPolygons = polygonJoin.enter()
            .append("path")
            .attr("class", "active")
            .attr("d", path)
            .attr("fill", "#6f8f85")
            .attr("stroke", "#f5f7f6")
            .attr("stroke-width", 0.8)
            .attr("opacity", 0)
            .on("mouseover", showTooltip)
            .on("mousemove", moveTooltip)
            .on("mouseout", hideTooltip);

        enteredPolygons.transition()
            .duration(1400)
            .ease(d3.easeCubicInOut)
            .attr("opacity", 1);

        polygonJoin
            .transition()
            .duration(500)
            .ease(d3.easeCubicInOut)
            .attr("d", path)
            .attr("fill", "#6f8f85")
            .attr("stroke", "#f5f7f6")
            .attr("stroke-width", 0.8)
            .attr("opacity", 1);

        polygonJoin.exit()
            .transition()
            .duration(350)
            .ease(d3.easeCubicInOut)
            .attr("opacity", 0)
            .remove();

        const pointJoin = activePointLayer.selectAll("circle.active-point")
            .data(activePoints, d => getName(d));

        const enteredPoints = pointJoin.enter()
            .append("circle")
            .attr("class", "active-point")
            .attr("cx", d => pointCoords(d)?.x ?? -999)
            .attr("cy", d => pointCoords(d)?.y ?? -999)
            .attr("r", 1)
            .attr("fill", "#f5f7f6")
            .attr("stroke", "#3d5a4a")
            .attr("stroke-width", 2)
            .attr("opacity", 0)
            .on("mouseover", showTooltip)
            .on("mousemove", moveTooltip)
            .on("mouseout", hideTooltip);

        enteredPoints.transition()
            .duration(1400)
            .ease(d3.easeCubicInOut)
            .attr("r", 6)
            .attr("opacity", 1);

        pointJoin
            .transition()
            .duration(500)
            .ease(d3.easeCubicInOut)
            .attr("cx", d => pointCoords(d)?.x ?? -999)
            .attr("cy", d => pointCoords(d)?.y ?? -999)
            .attr("r", 6)
            .attr("opacity", 1);

        pointJoin.exit()
            .transition()
            .duration(350)
            .ease(d3.easeCubicInOut)
            .attr("r", 1)
            .attr("opacity", 0)
            .remove();

        const lineFeatures = newFeatures.filter(d => {
            const pos = labelPosition(d);
            return pos && (Math.abs(pos.lineX2 - pos.lineX1) > 4 || Math.abs(pos.lineY2 - pos.lineY1) > 4);
        });

        const labelLineJoin = labelLineLayer.selectAll("line.label-line")
            .data(lineFeatures, d => getName(d));

        labelLineJoin.enter()
            .append("line")
            .attr("class", "label-line")
            .attr("x1", d => labelPosition(d).lineX1)
            .attr("y1", d => labelPosition(d).lineY1)
            .attr("x2", d => labelPosition(d).lineX1)
            .attr("y2", d => labelPosition(d).lineY1)
            .attr("opacity", 0)
            .transition()
            .duration(1000)
            .ease(d3.easeCubicInOut)
            .attr("x2", d => labelPosition(d).lineX2)
            .attr("y2", d => labelPosition(d).lineY2)
            .attr("opacity", 1);

        labelLineJoin
            .transition()
            .duration(400)
            .ease(d3.easeCubicInOut)
            .attr("x1", d => labelPosition(d).lineX1)
            .attr("y1", d => labelPosition(d).lineY1)
            .attr("x2", d => labelPosition(d).lineX2)
            .attr("y2", d => labelPosition(d).lineY2)
            .attr("opacity", 1);

        labelLineJoin.exit()
            .transition()
            .duration(300)
            .attr("opacity", 0)
            .remove();

        const labelJoin = labelLayer.selectAll("text.year-label")
            .data(newFeatures, d => getName(d));

        labelJoin.enter()
            .append("text")
            .attr("class", "year-label")
            .attr("x", d => (labelPosition(d) ? labelPosition(d).x : -999))
            .attr("y", d => (labelPosition(d) ? labelPosition(d).y : -999))
            .attr("text-anchor", d => (labelPosition(d) ? labelPosition(d).anchor : "middle"))
            .attr("font-size", 13)
            .attr("font-weight", 700)
            .attr("letter-spacing", 0.5)
            .attr("opacity", 0)
            .text(d => getName(d).toUpperCase())
            .transition()
            .duration(1400)
            .ease(d3.easeCubicInOut)
            .attr("opacity", 1);

        labelJoin
            .transition()
            .duration(400)
            .ease(d3.easeCubicInOut)
            .attr("x", d => (labelPosition(d) ? labelPosition(d).x : -999))
            .attr("y", d => (labelPosition(d) ? labelPosition(d).y : -999))
            .attr("text-anchor", d => (labelPosition(d) ? labelPosition(d).anchor : "middle"))
            .attr("opacity", 1);

        labelJoin.exit()
            .transition()
            .duration(300)
            .attr("opacity", 0)
            .remove();
    };

    updateMap(currentYear);
});
</script>
</body>
</html>
